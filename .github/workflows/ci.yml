name: CI

on:
    pull_request:
    push:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --no-audit --no-fund

            - name: Run tests
              run: npm run test:ci

    integration:
        runs-on: ubuntu-latest
        env: # Integration testing environment variables, not to be confused with the ones in .env which are for production
            SENDGRID_ENABLED: "false"
            INTEGRATION_RABBITMQ_AMQP_PORT: "5673"
            APP_PORT: "3000"
            DB_HOST: "db"
            DB_PORT: "3306"
            DB_NAME: "mailing"
            DB_USER: "mailing_user"
            DB_PASSWORD: "mailing_password"
            DB_ROOT_PASSWORD: "mailing_root_password"
            RABBITMQ_DEFAULT_USER: "devuser"
            RABBITMQ_DEFAULT_PASS: "devpass"
            RABBITMQ_MANAGEMENT_PORT: "15672"
            SENDGRID_API_KEY: "SG.test-key"
            SENDGRID_USER_CONFIRMED_TEMPLATE_ID: "d-test-template"
            SENDGRID_FROM_EMAIL: "noreply@example.com"
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci --no-audit --no-fund

            - name: Create compose env file
              run: |
                  cat > .env <<'EOF'
                  APP_PORT=${APP_PORT}
                  DB_HOST=${DB_HOST}
                  DB_PORT=${DB_PORT}
                  DB_NAME=${DB_NAME}
                  DB_USER=${DB_USER}
                  DB_PASSWORD=${DB_PASSWORD}
                  DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
                  DB_EXPOSE_PORT=3308
                  RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
                  RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
                  INTEGRATION_RABBITMQ_AMQP_PORT=${INTEGRATION_RABBITMQ_AMQP_PORT}
                  RABBITMQ_MANAGEMENT_PORT=${RABBITMQ_MANAGEMENT_PORT}
                  SENDGRID_API_KEY=${SENDGRID_API_KEY}
                  SENDGRID_USER_CONFIRMED_TEMPLATE_ID=${SENDGRID_USER_CONFIRMED_TEMPLATE_ID}
                  SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
                  EOF

            - name: Start integration stack
              run: docker compose -f compose.yml -f compose.integration.yml up --build -d

            - name: Run integration tests
              run: npm run test:integration

            - name: Stop integration stack
              if: always()
              run: docker compose -f compose.yml -f compose.integration.yml down -v
