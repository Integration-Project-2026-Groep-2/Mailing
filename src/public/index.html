<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users - Mailing Service</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <h1>Users</h1>
          <p class="subtitle">
            Live view from database (auto-refresh every 5s)
          </p>
        </div>
        <a class="button button-primary" href="/users/new">Create</a>
      </header>

      <section class="card">
        <div class="toolbar">
          <span id="status">Loading users...</span>
          <button
            id="refresh-btn"
            class="button button-secondary"
            type="button"
          >
            Refresh now
          </button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Active</th>
                <th>Company ID</th>
                <th>Updated At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/users.js"></script>
  </body>
</html>
